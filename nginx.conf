# 维修派单管家 - Nginx 反向代理配置模板
#
# 使用方式:
#   1. 构建前端: cd client && npm run build
#   2. 复制此配置到 /etc/nginx/sites-available/repair-dispatch
#   3. 创建软链接: ln -s /etc/nginx/sites-available/repair-dispatch /etc/nginx/sites-enabled/
#   4. 测试配置: nginx -t
#   5. 重载 Nginx: systemctl reload nginx
#
# 前置条件:
#   - 后端服务已通过 pm2 启动 (端口 8011)
#   - 前端构建产物位于 /home/yams/autorun-tmp-dir/s1-admin-system/client/dist
#   - 请将 server_name 替换为你的真实域名

server {
    listen 80;
    server_name repair-dispatch.yourdomain.com;  # ← 替换为你的真实域名

    # 日志配置
    access_log /var/log/nginx/repair-dispatch-access.log;
    error_log /var/log/nginx/repair-dispatch-error.log;

    # 前端静态文件服务
    location / {
        # 前端构建产物目录（请根据实际部署路径修改）
        root /home/yams/autorun-tmp-dir/s1-admin-system/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端服务
    location /api/ {
        proxy_pass http://localhost:8011;
        proxy_http_version 1.1;

        # 转发真实客户端 IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 转发 Host 头
        proxy_set_header Host $host;

        # 支持 WebSocket（预留）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /home/yams/autorun-tmp-dir/s1-admin-system/client/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}
